name: Security Review (Claude Code)

on:
  push:
    branches: [main, develop, osp-devop-custome]
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  security-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history for diff analysis

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install security review tool
        run: |
          cd /tmp
          git clone https://github.com/LuuHung247/claude-code-security-review.git || true
          cd claude-code-security-review
          pip install -q -r claudecode/requirements.txt

      - name: Run security review
        env:
          ANTHROPIC_AUTH_TOKEN: ${{ secrets.Z_AI_AUTH_TOKEN }}
          ANTHROPIC_BASE_URL: https://api.z.ai/api/anthropic
          ANTHROPIC_MODEL: glm-4.7
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd /tmp/claude-code-security-review
          python -m claudecode.github_action_audit \
            --repo "${{ github.repository }}" \
            --pr-number "${{ github.event.pull_request.number }}" \
            --github-token "${{ secrets.GITHUB_TOKEN }}"

      - name: Comment PR with findings
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            // If security review generated findings, they'll be auto-commented by claudecode
            core.notice('Security review completed. Check PR comments for details.');
